              React.createElement("button", { onClick: () => updateQty(item.id, 1), style: { background: "transparent", border: `1px solid ${border}`, width: 32, borderRadius: 40, cursor: "pointer" } }, "+")
            ),
            React.createElement("span", { style: { fontWeight: 600, color: ACCENT } }, `${item.price * item.qty} ₽`),
            React.createElement("button", { onClick: () => removeFromCart(item.id), style: { background: "none", border: "none", fontSize: 18, cursor: "pointer", opacity: 0.6 } }, "✕")
          ))
        ),
        React.createElement("div", { style: { textAlign: "right", borderTop: `1px solid ${border}`, paddingTop: 24 } },
          React.createElement("h3", { style: { fontSize: 28, color: fg } }, `Итого: ${cartTotal} ₽`),
          React.createElement("button", { onClick: () => navigate("checkout"), style: { marginTop: 20, padding: "12px 32px", background: ACCENT, border: "none", borderRadius: 60, fontWeight: 600, cursor: "pointer" } }, "Оформить заказ")
        )
      );
    }

    // ─── ОФОРМЛЕНИЕ ──────────────────────────────────────────────
    function CheckoutPage({ dark, fg, border, navigate, cartTotal }) {
      const [form, setForm] = React.useState({ name: "", phone: "", address: "" });
      const [done, setDone] = React.useState(false);
      if (done) return React.createElement("div", { style: { height: "100vh", display: "flex", justifyContent: "center", alignItems: "center", flexDirection: "column", textAlign: "center", padding: 24 } },
        React.createElement("div", { style: { fontSize: 64 } }, "✅"),
        React.createElement("h2", { style: { color: fg, marginTop: 16 } }, "Заказ принят!"),
        React.createElement("p", { style: { color: "#9ca3af" } }, "Менеджер свяжется с вами в ближайшее время."),
        React.createElement("button", { onClick: () => navigate("home"), style: { marginTop: 32, background: ACCENT, padding: "12px 32px", borderRadius: 60, border: "none", cursor: "pointer" } }, "На главную")
      );
      return React.createElement("div", { style: { padding: "100px 24px 80px", maxWidth: 600, margin: "0 auto" } },
        React.createElement("h1", { style: { fontSize: "clamp(32px, 6vw, 44px)", marginBottom: 32, color: fg } }, "Оформление"),
        React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 20 } },
          ["name", "phone", "address"].map(field => React.createElement("input", { key: field, type: "text", placeholder: field === "name" ? "Ваше имя" : field === "phone" ? "Телефон" : "Адрес доставки", value: form[field], onChange: e => setForm({...form, [field]: e.target.value}), style: { padding: "14px 20px", background: "transparent", border: `1px solid ${border}`, borderRadius: 60, color: fg, fontSize: 14 } })),
          React.createElement("div", { style: { padding: 20, borderRadius: 24, border: `1px solid ${border}`, textAlign: "center" } }, React.createElement("span", { style: { fontSize: 20, fontWeight: 600, color: ACCENT } }, `Сумма: ${cartTotal} ₽`)),
          React.createElement("button", { onClick: () => { if(form.name && form.phone) setDone(true); }, style: { padding: "14px", background: ACCENT, border: "none", borderRadius: 60, fontWeight: 700, cursor: "pointer" } }, "Подтвердить заказ")
        )
      );
    }

    // ─── ROOT ────────────────────────────────────────────────────
    function AgroneewApp() {
      const [page, setPage] = React.useState("home");
      const [selected, setSelected] = React.useState(null);
      const [cart, setCart] = React.useState([]);
      const [filter, setFilter] = React.useState("Все");
      const [search, setSearch] = React.useState("");
      const [dark, setDark] = React.useState(true);
      const [toast, setToast] = React.useState("");

      const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 2500); };
      const addToCart = product => {
        setCart(prev => { const ex = prev.find(i => i.id === product.id); return ex ? prev.map(i => i.id === product.id ? {...i, qty: i.qty+1} : i) : [...prev, {...product, qty: 1}]; });
        showToast(`${product.name} добавлен`);
      };
      const removeFromCart = id => setCart(prev => prev.filter(i => i.id !== id));
      const updateQty = (id, d) => setCart(prev => prev.map(i => i.id === id ? {...i, qty: Math.max(1, i.qty + d)} : i));
      const cartTotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
      const cartCount = cart.reduce((s,i) => s + i.qty, 0);
      const navigate = (p, product = null) => { setSelected(product); setPage(p); window.scrollTo(0,0); };

      const filtered = React.useMemo(() => PRODUCTS.filter(p => (filter === "Все" || p.category === filter) && (p.name.toLowerCase().includes(search.toLowerCase()) || p.tags.some(t => t.toLowerCase().includes(search.toLowerCase())))), [filter, search]);

      const bg = dark ? BG_DARK : BG_LIGHT;
      const fg = dark ? FG_DARK : FG_LIGHT;
      const border = dark ? "#1e293b" : "#cbd5e1";

      const ctx = { dark, fg, bg, border, navigate, addToCart, removeFromCart, updateQty, cartTotal, cart, filter, setFilter, search, setSearch, products: filtered };

      return React.createElement("div", { style: { background: bg, color: fg, fontFamily: "'Inter', sans-serif", minHeight: "100vh", transition: "all 0.3s" } },
        React.createElement("nav", { style: { position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 20px", height: 60, background: dark ? "rgba(10,12,18,0.9)" : "rgba(248,250,252,0.9)", backdropFilter: "blur(12px)", borderBottom: `1px solid ${border}` } },
          React.createElement("span", { onClick: () => navigate("home"), style: { fontFamily: "'Space Mono', monospace", fontSize: 16, fontWeight: 700, cursor: "pointer" } }, "AGRO", React.createElement("span", { style: { color: ACCENT } }, "NEW")),
          React.createElement("div", { style: { display: "flex", gap: 16, alignItems: "center" } },
            React.createElement("span", { onClick: () => navigate("catalog"), style: { fontSize: 12, cursor: "pointer" } }, "КАТАЛОГ"),
            React.createElement("span", { onClick: () => navigate("cart"), style: { position: "relative", cursor: "pointer" } }, "🛒", cartCount > 0 && React.createElement("span", { style: { position: "absolute", top: -8, right: -12, background: ACCENT, color: "#000", borderRadius: "50%", width: 16, height: 16, fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center" } }, cartCount)),
            React.createElement("button", { onClick: () => setDark(!dark), style: { background: "transparent", border: `1px solid ${border}`, borderRadius: 60, padding: "4px 12px", fontSize: 10, cursor: "pointer", color: fg } }, dark ? "🌙" : "☀️")
          )
        ),
        toast && React.createElement("div", { style: { position: "fixed", bottom: 20, right: 20, background: ACCENT, color: "#000", padding: "10px 20px", borderRadius: 60, fontSize: 12, fontWeight: 600, zIndex: 200, animation: "toast-in 0.2s ease" } }, toast),
        page === "home" && React.createElement(HomePage, { ...ctx, products: PRODUCTS }),
        page === "catalog" && React.createElement(CatalogPage, { ...ctx, products: filtered, filter, setFilter, search, setSearch }),
        page === "product" && selected && React.createElement(ProductPage, { ...ctx, product: selected }),
        page === "cart" && React.createElement(CartPage, { ...ctx, cart, removeFromCart, updateQty, cartTotal }),
        page === "checkout" && React.createElement(CheckoutPage, { ...ctx, cartTotal }),
        React.createElement("footer", { style: { padding: "32px 20px", textAlign: "center", borderTop: `1px solid ${border}`, fontSize: 11, color: dark ? "#6b7280" : "#4b5563" } }, "Agroneew © 2026 — Агро-информация нового поколения")
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AgroneewApp));
  </script>
</body>
</html>
