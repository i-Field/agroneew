    function generateBarcode(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
      return Array.from({ length: 21 }, (_, r) => Array.from({ length: 21 }, (_, c) => ((hash ^ (r * 13 + c * 31)) % 3 === 0) ? 1 : 0));
    }
